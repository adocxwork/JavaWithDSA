<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Responsive Shopping Site</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; line-height: 1.6; }
    .header { display: flex; justify-content: space-between; align-items: center; background-color: #333; color: #fff; padding: 1rem; }
    .header .logo { font-size: calc(1.5rem + 0.5vw); font-weight: bold; }
    .header .nav { display: flex; gap: 1rem; }
    .header .nav a { color: #fff; text-decoration: none; font-size: calc(1rem + 0.2vw); }
    .header .cart { display: flex; align-items: center; gap: 0.5rem; }
    .header .hamburger { display: none; font-size: 1.5rem; cursor: pointer; }
    .header .cart-count { background-color: red; color: white; border-radius: 50%; padding: 0.2rem 0.5rem; font-size: 0.9rem; }
    .sidebar { background-color: #f4f4f4; padding: 1rem; width: 20%; min-width: 200px; }
    .sidebar a { display: block; color: #333; text-decoration: none; margin-bottom: 1rem; font-size: 1rem; }
    .sidebar a:hover { color: #007bff; }
    .main-content { flex: 1; padding: 1rem; }
    .products-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; }
    .product { border: 1px solid #ddd; padding: 1rem; text-align: center; }
    .product img { max-width: 50%; height: auto; margin-bottom: 1rem; }
    .product button { background-color: #007bff; color: white; border: none; padding: 0.5rem 1rem; cursor: pointer; }
    .product button:hover { background-color: #0056b3; }
    .footer { background-color: #333; color: white; text-align: center; padding: 1rem; margin-top: 1rem; font-size: calc(1rem + 0.2vw); }
    .footer a { color: #007bff; text-decoration: none; }
    .footer a:hover { text-decoration: underline; }
    @media (max-width: 768px) {
      .products-grid { grid-template-columns: repeat(2, 1fr); }
      .header .nav { display: none; }
      .header .hamburger { display: block; }
      .sidebar { display: none; }
      .sidebar.active { display: block; width: 100%; }
    }
    @media (max-width: 480px) {
      .products-grid { grid-template-columns: 1fr; }
      .sidebar { padding: 0.5rem; }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="logo">ShopNow</div>
    <nav class="nav">
      <a href="#home">Home</a>
      <a href="#about">About</a>
      <a href="#contact">Contact</a>
      <a href="#help">Help</a>
    </nav>
    <div class="cart">
      <span class="hamburger" onclick="toggleMenu()">☰</span>
      <span>🛒</span>
      <span class="cart-count">3</span>
    </div>
  </header>
  <aside class="sidebar">
    <a href="#electronics">Electronics</a>
    <a href="#clothing">Clothing</a>
    <a href="#accessories">Accessories</a>
    <a href="#sale">Sale</a>
    <a href="#new-arrivals">New Arrivals</a>
  </aside>
  <main class="main-content">
    <div class="products-grid">
      <div class="product">
        <img src="book.jpg" alt="Product 1">
        <h4>Atomic Habits</h4>
        <p>$20</p>
        <button>Add to Cart</button>
      </div>
    </div>
  </main>
  <footer class="footer">
    <p>
      <a href="#about-us">About Us</a> | 
      <a href="#contact">Contact</a> | 
      <a href="#terms">Terms & Conditions</a>
    </p>
  </footer>
  <script>
    function toggleMenu() {
      const sidebar = document.querySelector('.sidebar');
      sidebar.classList.toggle('active');
    }
  </script>
</body>
</html>
