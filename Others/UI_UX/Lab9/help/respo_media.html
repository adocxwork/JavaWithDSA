<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Responsive Design for Multiple Devices</title>
  <style>
    /* Base styles for all screen sizes */
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      text-align: center;
    }

    .container {
      padding: 20px;
      color: white;
    }

    /* Smartphones (max-width: 599px) */
    @media (max-width: 599px) {
      .container {
        background-color: lightcoral;
      }
    }

    /* Tablets (600px to 767px) */
    @media (min-width: 600px) and (max-width: 767px) {
      .container {
        background-color: lightseagreen;
      }
    }

    /* Laptops (768px to 1023px) */
    @media (min-width: 768px) and (max-width: 1023px) {
      .container {
        background-color: cornflowerblue;
      }
    }

    /* Large screens (1024px and above) */
    @media (min-width: 1024px) {
      .container {
        background-color: darkslateblue;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Responsive Design for Multiple Devices</h1>
    <p>This background color changes based on the device size!</p>
  </div>
</body>
</html>
