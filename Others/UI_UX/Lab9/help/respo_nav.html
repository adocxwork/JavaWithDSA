<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Responsive Navigation Menu</title>
  <style>
    /* Basic Reset */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* Main navigation styling */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: #333;
      padding: 10px 20px;
      color: white;
    }

    /* Logo */
    .navbar .logo {
      font-size: 1.5em;
      font-weight: bold;
    }

    /* Navigation links */
    .navbar ul {
      list-style: none;
      display: flex;
    }

    .navbar ul li {
      margin-left: 20px;
    }

    .navbar ul li a {
      color: white;
      text-decoration: none;
      font-size: 1em;
    }

    /* Hamburger menu button (hidden on larger screens) */
    .menu-toggle {
      display: none;
      font-size: 1.5em;
      cursor: pointer;
    }

    /* Responsive styles */
    @media (max-width: 768px) {
      /* Hide the navigation links by default */
      .navbar ul {
        display: none;
        flex-direction: column;
        width: 100%;
        background-color: #333;
        position: absolute;
        top: 60px;
        left: 0;
      }

      /* Display navigation links when the menu is toggled */
      .navbar ul.active {
        display: flex;
      }

      /* Show the hamburger menu icon */
      .menu-toggle {
        display: block;
      }
    }
  </style>
</head>
<body>

  <header class="navbar">
    <div class="logo">MySite</div>
    <nav>
      <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">Services</a></li>
        <li><a href="#">Contact</a></li>
      </ul>
    </nav>
    <div class="menu-toggle" onclick="toggleMenu()">☰</div>
  </header>

  <script>
    /* JavaScript to toggle the active class on menu */
    function toggleMenu() {
      const navLinks = document.querySelector('.navbar ul');
      navLinks.classList.toggle('active');
    }
  </script>

</body>
</html>
