<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Responsive Image Example</title>
  <style>
    /* Make the image responsive using CSS */
    .responsive-image {
      width: 100%;
      height: auto; /* Maintains aspect ratio */
      max-width: 100%;
    }
  </style>
</head>
<body>
  <h1>Responsive Image Example</h1>

  <!-- Responsive image using srcset attribute -->
  <img 
    src="comp.png" 
    srcset="comp.png 600w,
            comp.png 768w,
            comp.png 1024w" 
    sizes="(max-width: 600px) 100vw, 
           (max-width: 768px) 75vw, 
           (max-width: 1024px) 50vw, 
           100vw"
    alt="Example Image"
    class="responsive-image">

  <p>The image above will change depending on the device screen size:</p>
  <ul>
    <li><strong>Small screens (up to 600px):</strong> loads `small-image.jpg`</li>
    <li><strong>Tablets (600px to 768px):</strong> loads `medium-image.jpg`</li>
    <li><strong>Laptops and larger (768px and above):</strong> loads `large-image.jpg`</li>
  </ul>
</body>
</html>
